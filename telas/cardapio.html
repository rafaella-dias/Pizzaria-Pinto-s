<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cardápio | Pizzaria Pinto's</title>
    <meta name="description" content="Veja o cardápio completo da Pizzaria Pinto's e monte seu pedido!">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/cardapio.css') }}">
</head>

<body>
    <main class="container">

        <!-- Logo -->
        <div class="header">
            <img class="logo-img" src="{{ url_for('static', filename='img/logo.pizza.png') }}"
                alt="Logo Pizzaria Pinto's">
        </div>

        <!-- Cardápio + Painel de Tamanho -->
        <div class="cardapio-wrapper">

            <!-- Lista de pizzas -->
            <section class="cardapio" id="lista-pizzas">
                {% for produto in produtos %}
                <div class="pizza-card">

                    <!-- Miniatura -->
                    <div class="pizza-thumb">
                        {% if produto.imagem %}
                        {% if produto.imagem.startswith('http') %}
                        <img src="{{ produto.imagem }}" alt="{{ produto.nome }}">
                        {% else %}
                        <img src="{{ url_for('static', filename='img/' + produto.imagem) }}" alt="{{ produto.nome }}">
                        {% endif %}
                        {% endif %}
                    </div>

                    <!-- Informações -->
                    <div class="pizza-info">
                        <h2>{{ produto.nome }}</h2>
                        <p>{{ produto.descricao }}</p>
                        <span class="preco">R$ {{ "%.2f"|format(produto.preco)|replace('.', ',') }}</span>
                    </div>

                    <!-- Contador de quantidade -->
                    <div class="quantidade-ctrl">
                        <button class="qty-btn" onclick="alterarQty({{ produto.id }}, -1)">-</button>
                        <span class="qty-num" id="qty-{{ produto.id }}">0</span>
                        <button class="qty-btn" onclick="alterarQty({{ produto.id }}, 1)">+</button>
                    </div>

                </div>
                {% endfor %}
            </section>

            <!-- Painel de tamanho -->
            <aside class="tamanho-panel">
                <span class="tamanho-label">TAM.</span>
                <button class="tamanho-btn" id="tam-P" onclick="selecionarTamanho('P', this)">P</button>
                <button class="tamanho-btn" id="tam-M" onclick="selecionarTamanho('M', this)">M</button>
                <button class="tamanho-btn" id="tam-G" onclick="selecionarTamanho('G', this)">G</button>
                <button class="tamanho-btn" id="tam-GG" onclick="selecionarTamanho('GG', this)">GG</button>
            </aside>

        </div>

        <!-- Botão Adicionar ao Carrinho -->
        <button class="btn-carrinho" id="btn-carrinho" onclick="adicionarAoCarrinho()">
            🛒 Adicionar ao carrinho
        </button>

    </main>

    <script>
        const quantidades = {};
        let tamanhoSelecionado = null;

        function alterarQty(id, delta) {
            if (!quantidades[id]) quantidades[id] = 0;
            quantidades[id] = Math.max(0, quantidades[id] + delta);
            document.getElementById('qty-' + id).textContent = quantidades[id];
            atualizarBotao();
        }

        function selecionarTamanho(tam, btn) {
            document.querySelectorAll('.tamanho-btn').forEach(b => b.classList.remove('ativo'));
            btn.classList.add('ativo');
            tamanhoSelecionado = tam;
            atualizarBotao();
        }

        function atualizarBotao() {
            const temItem = Object.values(quantidades).some(q => q > 0);
            const btn = document.getElementById('btn-carrinho');
            btn.style.display = (temItem && tamanhoSelecionado) ? 'flex' : 'none';
        }

        async function adicionarAoCarrinho() {
            const promises = [];
            for (const [id, qty] of Object.entries(quantidades)) {
                if (qty > 0) {
                    for (let i = 0; i < qty; i++) {
                        const formData = new FormData();
                        formData.append('produto_id', id);
                        formData.append('tamanho', tamanhoSelecionado);
                        promises.push(fetch('/add-carrinho', {
                            method: 'POST',
                            body: formData
                        }));
                    }
                }
            }
            await Promise.all(promises);
            window.location.href = '/carrinho';
        }
    </script>
</body>

</html>
